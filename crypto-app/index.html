<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vaulta — Self-custody Ethereum wallet. Send, receive, and grow crypto directly from your wallet. No middlemen, no permissions." />
    <title>Vaulta</title>
    <script>
      (function() {
        const theme = localStorage.getItem('vaulta-theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
      window.global = window;
      window.process = { env: {} };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
